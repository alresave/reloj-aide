<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#eef8ff">
    <title>Feliz Cumpleaños, Aidé</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="clock-page" aria-label="Reloj de cumpleaños para Aidé">
      <section class="message" aria-live="polite">
        <p class="intro">Para que nunca te falte la hora...</p>
        <time class="clock" id="clock" datetime="">
          <span class="clock-main" id="clock-main">10:09</span>
          <span class="clock-detail">
            <span id="clock-seconds">24</span>
            <span id="clock-period">AM</span>
          </span>
        </time>
        <p class="script">...y para que siempre me la puedas preguntar.</p>
      </section>

      <p class="dedication">
        <span>Desde aquel camión...</span>
        <span>todas las horas me llevan a ti.</span>
        <span>Feliz Cumpleaños, Aidé.</span>
      </p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
